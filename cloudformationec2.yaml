AWSTemplateFormatVersion: '2010-09-09'
Description: Minecraft server cloudformation template.

Parameters:
  CreatorIp:
    Type: String
    Description: 'Give your own IP address in the format x.x.x.x/32 (e.g., 85.76.10.20/32). You can add friends IP addresses later in the AWS console.'
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$'

Resources:
  MinecraftInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  # IAM Instance Profile, which is required to attach the role to the EC2 instance
  MinecraftInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref MinecraftInstanceRole

  mineserverGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Minecraft server
      SecurityGroupIngress:
        # SSH for maintenance
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref CreatorIp
          Description: SSH connection (for maintenance)

        # Allow to connect to Minecraft server
        - IpProtocol: tcp
          FromPort: 25565
          ToPort: 25565
          CidrIp: !Ref CreatorIp
          Description: Minecraft TCP connection, add more from console if you want to allow friends to connect

  mineserverInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64}}'
      InstanceType: t3.small
      SecurityGroupIds:
        - !Ref mineserverGroup
      IamInstanceProfile: !Ref MinecraftInstanceProfile
      Tags:
        - Key: Name
          Value: mineserver

      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # Update system and install Java 21
          dnf update -y
          dnf install -y java-25-amazon-corretto-headless screen

          # Make directory for Minecraft server
          mkdir -p /home/ec2-user/minecraft
          cd /home/ec2-user/minecraft

          # Load Minecraft server jar file
          # You can get newer version from minecraft website by copying download link
          wget https://piston-data.mojang.com/v1/objects/823e2250d24b3ddac457a60c92a6a941943fcd6a/server.jar

          # 4. Accept the EULA
          echo "eula=true" > eula.txt

          # 5. Create startup script and grant it execution permissions
          echo "java -Xmx1024M -Xms1024M -jar server.jar nogui" > start.sh
          chmod +x start.sh

          # 6. Grant default user (ec2-user) permissions to these files
          chown -R ec2-user:ec2-user /home/ec2-user/minecraft
